{% extends "base.html" %}

{% block title %}{{ titulo }} · Estudo por Questões{% endblock %}

{% block content %}
<section>
    <div class="section-heading"><h2>{{ titulo }}</h2></div>
    <div class="form-panel">
        <form method="post">
            {% csrf_token %}
            {% if form.non_field_errors %}<div class="form-errors">{{ form.non_field_errors }}</div>{% endif %}
            <div class="form-grid">
                <div class="full">
                    <label for="{{ form.nome.id_for_label }}">Nome da disciplina</label>
                    {{ form.nome }}{{ form.nome.errors }}
                </div>
            </div>
            <div class="inline-actions inline-actions-end" style="margin-top:1rem;">
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
