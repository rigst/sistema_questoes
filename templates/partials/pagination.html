{% load querystring %}
{% if page_obj and page_obj.paginator.num_pages > 1 %}
    <nav class="pagination" aria-label="Paginação">
        {% if page_obj.has_previous %}
            <a class="btn btn-secondary btn-icon-action" href="{% querystring page=page_obj.previous_page_number %}" title="Página anterior" aria-label="Página anterior">
                <svg viewBox="0 0 24 24" class="action-icon" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                <span class="visually-hidden">Página anterior</span>
            </a>
        {% endif %}
        <span class="pagination-summary">Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a class="btn btn-secondary btn-icon-action" href="{% querystring page=page_obj.next_page_number %}" title="Próxima página" aria-label="Próxima página">
                <svg viewBox="0 0 24 24" class="action-icon" aria-hidden="true"><path d="m9 6 6 6-6 6"/></svg>
                <span class="visually-hidden">Próxima página</span>
            </a>
        {% endif %}
    </nav>
{% endif %}
