# ============================================================
# Nginx — Sistema de Estudos por Questões (HTTP -> HTTPS)
# Troque SEU_DOMINIO pelo domínio real antes de usar.
# ============================================================

upstream questoes_app {
    server unix:/home/rodrigostolben/Projetos/sistema_questoes/questoes.sock fail_timeout=0;
}

server {
    listen 80;
    server_name SEU_DOMINIO;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name SEU_DOMINIO;

    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Acompanhar MAX_UPLOAD_SIZE_MB no .env.
    client_max_body_size 60M;
    keepalive_timeout 5;

    access_log /var/log/nginx/questoes.access.log;
    error_log /var/log/nginx/questoes.error.log info;

    location /static/ {
        alias /home/rodrigostolben/Projetos/sistema_questoes/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Imagens de questões e PDFs de relatório (uploads/saídas do usuário).
    # Observação: servidos diretamente por URL. Para isolamento estrito por
    # usuário, troque por uma view Django protegida + X-Accel-Redirect.
    location /media/ {
        alias /home/rodrigostolben/Projetos/sistema_questoes/media/;
        expires 7d;
    }

    location / { try_files $uri @proxy_to_app; }

    location @proxy_to_app {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        proxy_pass http://questoes_app;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}
